<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neigungssensor</title>

    <style>
        @font-face {
            font-family: "Numbers";
            src: url("https://benla25.github.io/numbers.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin-top: 50px; }
        .data { font-family: "Numbers", monospace; font-size: 40px; font-weight: bold; color: #007BFF; }
        .records { margin-top: 30px; font-size: 18px; color: #555; }
        .record-val { font-family: "Numbers", monospace; font-weight: bold; color: #28a745; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; color: white; background: black; border: 1px solid white; border-radius: 50px; }
    </style>
</head>
<body>

    <h1>GNT</h1>
    
    <button id="request-permission">Sensor aktivieren</button>
    
    <p><span id="beta" class="data"> 00.0</span></p>

    <div class="records">
        <p>
            <span id="max-left" class="record-val"> 00.0</span> L/R 
            <span id="max-right" class="record-val">00.0</span>
        </p>
        <button id="reset-btn" style="padding: 5px 10px; font-size: 12px; display: none;">Werte zurücksetzen</button>
    </div>

    <script>
        const requestBtn = document.getElementById('request-permission');
        const resetBtn = document.getElementById('reset-btn');

        let maxLeft = 0;
        let maxRight = 0;

        /* Stay-Awake-Modus aktivieren */
        let wakeLock = null;
        async function enableWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request("screen");
            } catch (e) {
                console.log("WakeLock nicht verfügbar:", e);
            }
        }
        enableWakeLock();

        /* Automatische Ausrichtungssperre */
        async function lockOrientation() {
            try {
                await screen.orientation.lock("portrait");
            } catch (e) {
                console.log("Ausrichtungssperre nicht möglich:", e);
            }
        }

        // Formatierung: zweistellig + eine Nachkommastelle
        function fmt(v) {
            return (v >= 0 ? " " : "-") + Math.abs(v).toFixed(1).padStart(4, "0");
        }

        function startOrientationTracking() {
            window.addEventListener('deviceorientation', (event) => {
                let beta = event.beta || 0;
                let gamma = event.gamma || 0;

                /* Automatische Ausrichtungssperre bei 90° CCW */
                if (gamma < -80 && gamma > -100) {
                    lockOrientation();
                }

                // Pfeile aus Numbers
                let arrow = " ";
                if (beta < 0) arrow = "<";
                else if (beta > 0) arrow = ">";
				else if (beta = 0) arrow = " ";

                // Aktuellen Wert anzeigen (formatiert)
                document.getElementById('beta').textContent = arrow + fmt(beta);

                // Höchstwerte aktualisieren
                if (beta < 0) {
                    if (beta < maxLeft) {
                        maxLeft = beta;
                        document.getElementById('max-left').textContent = fmt(maxLeft);
                    }
                } else if (beta > 0) {
                    if (beta > maxRight) {
                        maxRight = beta;
                        document.getElementById('max-right').textContent = fmt(maxRight);
                    }
                }
            });

            requestBtn.style.display = 'none';
            resetBtn.style.display = 'inline-block';
        }

        resetBtn.addEventListener('click', () => {
            maxLeft = 0;
            maxRight = 0;
            document.getElementById('max-left').textContent = fmt(0);
            document.getElementById('max-right').textContent = fmt(0);
        });

        requestBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {

                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startOrientationTracking();
                        else alert('Zugriff verweigert.');
                    })
                    .catch(console.error);

            } else {
                startOrientationTracking();
            }
        });
    </script>

</body>
</html>
